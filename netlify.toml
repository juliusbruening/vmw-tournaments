[build]
  publish    = "public"
  functions  = "netlify/functions"

# Functions, die die DKV-PDF-Vorlage zur Laufzeit lesen, müssen die
# Asset-Datei in ihren Function-Bundle einschließen (Netlify bundlet
# Funktionen mit esbuild und liest sonst nichts außerhalb der Function-Files).
[functions."me"]
  included_files = ["assets/dkv-einsatzbogen-vorlage.pdf"]

[functions."admin"]
  included_files = ["assets/dkv-einsatzbogen-vorlage.pdf"]

# ────────────────────────────────────────────────────────────────────────────
# API-Routen (friendly URLs vor SPA-Routing!)
# ────────────────────────────────────────────────────────────────────────────

# Public APIs
[[redirects]]
  from   = "/api/data"
  to     = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from   = "/api/tournaments"
  to     = "/.netlify/functions/tournaments-list"
  status = 200

# Public Schiri-Stats: /api/club/referees/<id>/stats
[[redirects]]
  from   = "/api/club/referees/*/stats"
  to     = "/.netlify/functions/public-referee-stats"
  status = 200

# Public Banner: /api/banner
[[redirects]]
  from   = "/api/banner"
  to     = "/.netlify/functions/banner"
  status = 200

# Auth
[[redirects]]
  from   = "/api/auth/referee-login"
  to     = "/.netlify/functions/auth-login"
  status = 200

# Schiri-Self-Service
[[redirects]]
  from   = "/api/me/*"
  to     = "/.netlify/functions/me/:splat"
  status = 200

# Admin (Trainer + Master)
[[redirects]]
  from   = "/api/admin/*"
  to     = "/.netlify/functions/admin/:splat"
  status = 200

# ────────────────────────────────────────────────────────────────────────────
# SPA-Routing
# ────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/t/*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/me/*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/index.html"
  status = 200

# N2 — Persistente Profil-URL nach Browser-Refresh.
[[redirects]]
  from   = "/profil"
  to     = "/index.html"
  status = 200

# Statics & Cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS/CSS liegen direkt unter /public (nicht /static) — ohne diese Header
# liefert Netlify sie ohne Cache-Control aus und jeder Pageload lädt
# ~250KB neu. 1h Browser-Cache + must-revalidate: nach einem Deploy holt
# der Browser spätestens nach 1h die neue Version (HTML ist eh max-age=0).
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Icons ändern sich praktisch nie
[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Kein eigener Header für /sw.js: er würde mit der /*.js-Regel gemerged
# (Netlify kombiniert überlappende Regeln). Browser prüfen SW-Updates
# ohnehin standardmäßig am HTTP-Cache vorbei (updateViaCache-Default).
